apiVersion: v1
kind: ServiceAccount
metadata:
  name: openliberty-test
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openliberty-test-node-reader
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openliberty-test-node-reader
subjects:
- kind: ServiceAccount
  name: openliberty-test
  namespace: default
roleRef:
  kind: ClusterRole
  name: openliberty-test-node-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openliberty-test
  namespace: default
  labels:
    app: openliberty-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: openliberty-test
  template:
    metadata:
      labels:
        app: openliberty-test
    spec:
      serviceAccountName: openliberty-test
      containers:
      - name: openliberty-container
        image: kregistry.siwko.org:5000/openliberty-test:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 9080
          name: http
        - containerPort: 9443
          name: https
        
        # Open Liberty is very efficient, but setting limits ensures cluster stability
        resources:
          limits:
            cpu: "1"
            memory: 512Mi
          requests:
            cpu: "250m"
            memory: 256Mi
        
        # Probes leverage Liberty's built-in MicroProfile Health endpoints
        livenessProbe:
          httpGet:
            path: /health/live
            port: 9080
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 9080
          initialDelaySeconds: 15
          periodSeconds: 10
        
        # Security best practices
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: openliberty-service
  namespace: default
spec:
  type: NodePort  # Changed from ClusterIP
  selector:
    app: openliberty-test
  ports:
  - protocol: TCP
    port: 9443
    targetPort: 9443
    nodePort: 30443  # Exposes HTTPS on port 30443 of every cluster node
    name: https
  - protocol: TCP
    port: 9080
    targetPort: 9080
    nodePort: 30080  # Exposes HTTP on port 30080 of every cluster node
    name: http