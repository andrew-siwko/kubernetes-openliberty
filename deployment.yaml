apiVersion: apps/v1
kind: Deployment
metadata:
  name: openliberty-app
  namespace: default
  labels:
    app: openliberty-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: openliberty-app
  template:
    metadata:
      labels:
        app: openliberty-app
    spec:
      containers:
      - name: openliberty-container
        image: your-registry/your-app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9080
          name: http
        - containerPort: 9443
          name: https
        
        # Open Liberty is very efficient, but setting limits ensures cluster stability
        resources:
          limits:
            cpu: "1"
            memory: 512Mi
          requests:
            cpu: "250m"
            memory: 256Mi
        
        # Probes leverage Liberty's built-in MicroProfile Health endpoints
        livenessProbe:
          httpGet:
            path: /health/live
            port: 9080
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 9080
          initialDelaySeconds: 15
          periodSeconds: 10
        
        # Security best practices
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: openliberty-service
  namespace: default
spec:
  selector:
    app: openliberty-app
  ports:
  - protocol: TCP
    port: 9080
    targetPort: 9080
    name: http
  type: ClusterIP